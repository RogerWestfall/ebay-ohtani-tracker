name: Scrape eBay Listings

on:
  # Scheduled runs only work with SCRAPER_API_KEY secret set
  # (eBay blocks GitHub Actions datacenter IPs without a proxy)
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:          # Manual trigger from Actions tab
  push:
    branches: [main]
    paths:
      - 'portfolio.json'
      - '.github/workflows/scrape.yml'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Scrape eBay listings
        run: node scripts/scrape.js
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/listings.json
          git diff --cached --quiet || (git commit -m "Update eBay listings data [skip ci]" && git push)
